name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type of build"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - development
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        default: "v1.0.0"
        type: string
  push:
    tags:
      - "v*" # Triggers on tags like v1.0.0, v1.0.0-dev, etc.

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks

      # Determine build profile and version
      - name: Set build profile & version
        id: meta
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.build_type }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == *"-dev"* ]]; then
              PROFILE="development"
              VERSION="${TAG%-dev}"
            else
              PROFILE="production"
              VERSION="${TAG}"
            fi
          fi
          echo "profile=${PROFILE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # Read project name from app.json
      - name: Get project name
        id: project
        run: |
          NAME=$(jq -r '.expo.name' app.json)
          if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
            NAME="App"
          fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      # Construct the APK filename
      - name: Build APK filename
        id: apk
        run: |
          BASE="${{ steps.project.outputs.name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          PROFILE="${{ steps.meta.outputs.profile }}"
          SUFFIX="$([ "$PROFILE" == "development" ] && echo "-dev" || echo "")"
          echo "apk_name=${BASE}${SUFFIX}-${VERSION}-arm64-v8a.apk" >> $GITHUB_OUTPUT

      # Build the APK – no obsolete flags, keystore via environment variables
      - name: Build APK (arm64-v8a only)
        env:
          EAS_ANDROID_KEYSTORE_PATH: ./keystore.jks
          EAS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EAS_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EAS_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          eas build --platform android \
            --profile ${{ steps.meta.outputs.profile }} \
            --local \
            --output ./${{ steps.apk.outputs.apk_name }} \
            --non-interactive

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ./${{ steps.apk.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release (only on tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./${{ steps.apk.outputs.apk_name }}
