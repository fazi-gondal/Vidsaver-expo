name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type of build"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - development
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        default: "v1.0.0"
        type: string
  push:
    tags:
      - "v*" # Triggers on tags like v1.0.0, v1.0.0-dev, etc.

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks

      # Determine which build profile to use
      - name: Set build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "profile=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == *"-dev"* ]]; then
              echo "profile=development" >> $GITHUB_OUTPUT
            else
              echo "profile=production" >> $GITHUB_OUTPUT
            fi
          fi

      # Extract the version number (strip "-dev" from tag if present)
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == *"-dev"* ]]; then
              CLEAN_TAG="${TAG%-dev}"
              echo "version=${CLEAN_TAG}" >> $GITHUB_OUTPUT
            else
              echo "version=${TAG}" >> $GITHUB_OUTPUT
            fi
          fi

      # Read the project name from app.json
      - name: Get project name
        id: project
        run: |
          NAME=$(jq -r '.name' app.json)
          if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
            echo "⚠️ Could not read name from app.json, using 'App' as fallback"
            NAME="App"
          fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      # Construct the final APK filename
      - name: Set APK name
        id: apk_name
        run: |
          BASE="${{ steps.project.outputs.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          PROFILE="${{ steps.profile.outputs.profile }}"
          ARCH="arm64-v8a"

          if [ "$PROFILE" == "development" ]; then
            SUFFIX="-dev"
          else
            SUFFIX=""
          fi

          APK_NAME="${BASE}${SUFFIX}-${VERSION}-${ARCH}.apk"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV

      - name: Build APK (only arm64-v8a)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          eas build --platform android \
            --profile ${{ steps.profile.outputs.profile }} \
            --local \
            --output ./${{ steps.apk_name.outputs.apk_name }} \
            --non-interactive \
            --android-keystore-path ./keystore.jks \
            --android-keystore-password "$ANDROID_KEYSTORE_PASSWORD" \
            --android-key-password "$ANDROID_KEY_PASSWORD" \
            --android-key-alias "$ANDROID_KEY_ALIAS" \
            --android-architecture arm64-v8a

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_name.outputs.apk_name }}
          path: ./${{ steps.apk_name.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release (only on tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./${{ steps.apk_name.outputs.apk_name }}
